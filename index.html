<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Ledger — food log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3F5EF;
    --paper-raised:#FFFFFF;
    --ink:#1F2A24;
    --ink-soft:#5B6660;
    --hairline:#D9DED4;
    --tomato:#C4402D;
    --basil:#4C7A5E;
    --basil-soft:#E7EFE9;
    --amber:#B8863B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Public Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:80px;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:28px 20px 40px;
  }
  header{
    margin-bottom:22px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 4px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:34px;
    margin:0;
    letter-spacing:-.01em;
  }
  .today-date{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--ink-soft);
    margin-top:6px;
  }

  /* Log input */
  .log-box{
    background:var(--paper-raised);
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:14px;
    margin-bottom:22px;
  }
  .log-box textarea{
    width:100%;
    border:none;
    resize:none;
    font-family:'Public Sans',sans-serif;
    font-size:16px;
    color:var(--ink);
    background:transparent;
    min-height:52px;
    line-height:1.4;
  }
  .log-box textarea:focus{outline:none;}
  .log-box textarea::placeholder{color:#9AA39A;}
  .log-actions{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:10px;
    margin-top:6px;
  }
  .hint{
    font-size:12px;
    color:var(--ink-soft);
    margin-right:auto;
  }
  button.primary{
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:9px;
    padding:10px 18px;
    font-family:'Public Sans',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:opacity .15s ease;
  }
  button.primary:hover{opacity:.85;}
  button.primary:disabled{opacity:.5;cursor:default;}
  button.ghost{
    background:none;
    border:1px solid var(--hairline);
    color:var(--ink-soft);
    border-radius:9px;
    padding:10px 14px;
    font-size:13px;
    cursor:pointer;
    font-family:'Public Sans',sans-serif;
  }

  /* Nutrition facts panel — signature element */
  .facts{
    background:var(--paper-raised);
    border:2px solid var(--ink);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:26px;
  }
  .facts-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:20px;
    border-bottom:8px solid var(--ink);
    padding-bottom:6px;
    margin-bottom:8px;
  }
  .facts-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:7px 0;
    border-bottom:1px solid var(--hairline);
    font-family:'IBM Plex Mono',monospace;
  }
  .facts-row:last-child{border-bottom:none;}
  .facts-row .label{
    font-size:13px;
    color:var(--ink-soft);
    font-family:'Public Sans',sans-serif;
  }
  .facts-row .value{
    font-size:16px;
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .facts-row.total .label{color:var(--ink);font-weight:600;}
  .facts-row.total .value{color:var(--tomato);font-size:20px;}

  /* Entries */
  .day-heading{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:24px 0 10px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .day-heading::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--hairline);
  }
  .entry{
    background:var(--paper-raised);
    border:1px solid var(--hairline);
    border-radius:12px;
    padding:13px 15px;
    margin-bottom:10px;
  }
  .entry-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .entry-desc{
    font-family:'Fraunces',serif;
    font-size:16px;
    font-style:italic;
    color:var(--ink);
    flex:1;
  }
  .entry-cals{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:15px;
    color:var(--tomato);
    white-space:nowrap;
  }
  .entry-items{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .pill{
    background:var(--basil-soft);
    color:var(--basil);
    font-size:12px;
    font-family:'IBM Plex Mono',monospace;
    padding:4px 9px;
    border-radius:20px;
  }
  .entry-time{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:#AAB2A9;
    margin-top:8px;
  }
  .entry-delete{
    background:none;
    border:none;
    color:#AAB2A9;
    font-size:12px;
    cursor:pointer;
    font-family:'IBM Plex Mono',monospace;
    margin-top:8px;
    padding:0;
  }
  .entry-delete:hover{color:var(--tomato);}

  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    padding:30px 0;
  }

  /* Settings */
  .settings-toggle{
    position:fixed;
    top:20px;
    right:20px;
    background:var(--paper-raised);
    border:1px solid var(--hairline);
    border-radius:50%;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:16px;
  }
  .settings-panel{
    position:fixed;
    inset:0;
    background:rgba(31,42,36,0.4);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:10;
  }
  .settings-panel.open{display:flex;}
  .settings-card{
    background:var(--paper-raised);
    width:100%;
    max-width:560px;
    border-radius:18px 18px 0 0;
    padding:22px 20px 30px;
  }
  .settings-card h2{
    font-family:'Fraunces',serif;
    font-size:20px;
    margin:0 0 4px;
  }
  .settings-card p{
    font-size:13px;
    color:var(--ink-soft);
    margin:0 0 14px;
    line-height:1.5;
  }
  .settings-card input, .settings-card select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--hairline);
    border-radius:8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    margin-bottom:12px;
  }
  .settings-card a{color:var(--basil);}
  .status{
    font-size:12px;
    padding:8px 10px;
    border-radius:8px;
    margin-bottom:12px;
  }
  .status.error{background:#FBEAE7;color:var(--tomato);}
  .status.ok{background:var(--basil-soft);color:var(--basil);}
</style>
</head>
<body>
<div class="settings-toggle" onclick="openSettings()">⚙</div>

<div class="wrap">
  <header>
    <p class="eyebrow">Daily ledger</p>
    <h1>What did you eat?</h1>
    <p class="today-date" id="todayDate"></p>
  </header>

  <div class="log-box">
    <textarea id="mealInput" placeholder="e.g. two eggs, a slice of sourdough toast, and a coffee with milk" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();logMeal();}"></textarea>
    <div class="log-actions">
      <span class="hint" id="hint">Describe it in plain words</span>
      <button class="primary" id="logBtn" onclick="logMeal()">Log meal</button>
    </div>
  </div>

  <div class="facts">
    <div class="facts-title">Today's totals</div>
    <div class="facts-row total"><span class="label">Calories</span><span class="value" id="totalCals">0</span></div>
    <div class="facts-row"><span class="label">Protein</span><span class="value" id="totalProtein">0 g</span></div>
    <div class="facts-row"><span class="label">Carbs</span><span class="value" id="totalCarbs">0 g</span></div>
    <div class="facts-row"><span class="label">Fat</span><span class="value" id="totalFat">0 g</span></div>
  </div>

  <div id="entriesContainer"></div>
</div>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-card">
    <h2>Gemini API key</h2>
    <p>Stored only on this device. Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> — don't enable billing on that project, it's what keeps this free.</p>
    <input type="password" id="apiKeyInput" placeholder="AIza...">
    <select id="modelSelect">
      <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (fastest, most free requests)</option>
      <option value="gemini-2.5-flash">gemini-2.5-flash (more accurate)</option>
    </select>
    <button class="primary" style="width:100%" onclick="saveSettings()">Save</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'ledger_entries_v1';
const SETTINGS_KEY = 'ledger_settings_v1';

function getSettings(){
  try{ return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }catch(e){ return {}; }
}
function saveSettings(){
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const model = document.getElementById('modelSelect').value;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({apiKey, model}));
  closeSettings();
}
function openSettings(){
  const s = getSettings();
  if(s.apiKey) document.getElementById('apiKeyInput').value = s.apiKey;
  if(s.model) document.getElementById('modelSelect').value = s.model;
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings(){
  document.getElementById('settingsPanel').classList.remove('open');
}

function getEntries(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }catch(e){ return []; }
}
function saveEntries(entries){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function todayKey(d = new Date()){
  return d.toISOString().slice(0,10);
}

function setHint(text, isError){
  const hint = document.getElementById('hint');
  hint.textContent = text;
  hint.style.color = isError ? 'var(--tomato)' : 'var(--ink-soft)';
}

async function logMeal(){
  const input = document.getElementById('mealInput');
  const text = input.value.trim();
  if(!text) return;

  const settings = getSettings();
  if(!settings.apiKey){
    setHint('Add your Gemini API key first — tap ⚙ above', true);
    openSettings();
    return;
  }

  const btn = document.getElementById('logBtn');
  btn.disabled = true;
  btn.textContent = 'Parsing…';
  setHint('Describe it in plain words', false);

  try{
    const parsed = await parseMeal(text, settings.apiKey, settings.model || 'gemini-2.5-flash-lite');
    const entries = getEntries();
    entries.unshift({
      id: Date.now().toString(36),
      raw: text,
      timestamp: new Date().toISOString(),
      items: parsed.items || [],
      total_calories: parsed.total_calories || 0,
      total_protein_g: parsed.total_protein_g || 0,
      total_carbs_g: parsed.total_carbs_g || 0,
      total_fat_g: parsed.total_fat_g || 0
    });
    saveEntries(entries);
    input.value = '';
    render();
  }catch(err){
    console.error(err);
    setHint('Could not parse that — try rephrasing or check your API key', true);
  }finally{
    btn.disabled = false;
    btn.textContent = 'Log meal';
  }
}

async function parseMeal(text, apiKey, model){
  const schema = {
    type: "object",
    properties: {
      items: {
        type: "array",
        items: {
          type: "object",
          properties: {
            name: { type: "string" },
            quantity: { type: "string" },
            calories: { type: "number" },
            protein_g: { type: "number" },
            carbs_g: { type: "number" },
            fat_g: { type: "number" }
          },
          required: ["name","calories","protein_g","carbs_g","fat_g"]
        }
      },
      total_calories: { type: "number" },
      total_protein_g: { type: "number" },
      total_carbs_g: { type: "number" },
      total_fat_g: { type: "number" }
    },
    required: ["items","total_calories","total_protein_g","total_carbs_g","total_fat_g"]
  };

  const prompt = `You are a nutrition estimation assistant. A person will describe a meal in plain language. Break it into individual food items with reasonable portion assumptions when not specified, and estimate calories and macros (protein, carbs, fat in grams) for each item using standard nutrition data. Then sum the totals. Be reasonable and realistic, not overly precise. Meal description: "${text}"`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: {
        responseMimeType: 'application/json',
        responseSchema: schema
      }
    })
  });

  if(!res.ok){
    const errText = await res.text();
    throw new Error('API error: ' + errText);
  }

  const data = await res.json();
  const textOut = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!textOut) throw new Error('No content returned');
  return JSON.parse(textOut);
}

function deleteEntry(id){
  const entries = getEntries().filter(e => e.id !== id);
  saveEntries(entries);
  render();
}

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
}

function groupByDay(entries){
  const groups = {};
  entries.forEach(e => {
    const key = e.timestamp.slice(0,10);
    if(!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  return groups;
}

function dayLabel(key){
  const today = todayKey();
  const yestKey = todayKey(new Date(Date.now() - 86400000));
  if(key === today) return 'Today';
  if(key === yestKey) return 'Yesterday';
  return new Date(key + 'T00:00:00').toLocaleDateString([], {weekday:'long', month:'short', day:'numeric'});
}

function render(){
  const entries = getEntries();
  const today = todayKey();
  const todays = entries.filter(e => e.timestamp.slice(0,10) === today);

  const totals = todays.reduce((acc, e) => {
    acc.cals += e.total_calories || 0;
    acc.protein += e.total_protein_g || 0;
    acc.carbs += e.total_carbs_g || 0;
    acc.fat += e.total_fat_g || 0;
    return acc;
  }, {cals:0, protein:0, carbs:0, fat:0});

  document.getElementById('totalCals').textContent = Math.round(totals.cals);
  document.getElementById('totalProtein').textContent = Math.round(totals.protein) + ' g';
  document.getElementById('totalCarbs').textContent = Math.round(totals.carbs) + ' g';
  document.getElementById('totalFat').textContent = Math.round(totals.fat) + ' g';

  const container = document.getElementById('entriesContainer');
  container.innerHTML = '';

  if(entries.length === 0){
    container.innerHTML = '<div class="empty">Nothing logged yet — describe your first meal above.</div>';
    return;
  }

  const groups = groupByDay(entries);
  const sortedKeys = Object.keys(groups).sort().reverse();

  sortedKeys.forEach(key => {
    const heading = document.createElement('div');
    heading.className = 'day-heading';
    heading.textContent = dayLabel(key);
    container.appendChild(heading);

    groups[key].forEach(e => {
      const card = document.createElement('div');
      card.className = 'entry';
      const pills = (e.items || []).map(i => `<span class="pill">${i.name}${i.quantity ? ' · ' + i.quantity : ''}</span>`).join('');
      card.innerHTML = `
        <div class="entry-top">
          <div class="entry-desc">${e.raw}</div>
          <div class="entry-cals">${Math.round(e.total_calories)} kcal</div>
        </div>
        <div class="entry-items">${pills}</div>
        <div class="entry-time">${fmtTime(e.timestamp)}</div>
        <button class="entry-delete" onclick="deleteEntry('${e.id}')">Remove</button>
      `;
      container.appendChild(card);
    });
  });
}

document.getElementById('todayDate').textContent = new Date().toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
render();

// open settings automatically on first visit if no key set
if(!getSettings().apiKey){
  setTimeout(openSettings, 400);
}
</script>
</body>
</html>
